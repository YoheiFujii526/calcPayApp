spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/settlement_db}
    username: ${DB_USERNAME:settlement_user}
    password: ${DB_PASSWORD:settlement_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: ${PORT:${SERVER_PORT:8080}}
